name = "image-workbench"
compatibility_date = "2026-04-26"
pages_build_output_dir = "."

# Create a KV namespace and replace the IDs before deploying:
#   npx wrangler kv namespace create IMAGE_WORKBENCH_JOBS
#   npx wrangler kv namespace create IMAGE_WORKBENCH_JOBS --preview
[[kv_namespaces]]
binding = "IMAGE_WORKBENCH_JOBS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
